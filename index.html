<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background: radial-gradient(circle, #0f172a, #020617);
  color:white;
}

.container {
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
  text-align:center;
}

.title {
  font-size:48px;
  font-weight:bold;
  margin-bottom:20px;
}

.cards {
  display:flex;
  gap:20px;
  margin-top:30px;
}

.card {
  flex:1;
  background:#0f172a;
  padding:20px;
  border-radius:15px;
  border:1px solid #1e293b;
}

.preview {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:10px;
  justify-content:center;
}

.preview img {
  width:90px;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.homeBtn { background:#3b82f6; color:white; }
.awayBtn { background:#f97316; color:white; }

.analyzeBtn {
  margin-top:30px;
  background:linear-gradient(90deg, purple, violet);
  color:white;
  padding:15px 30px;
  font-size:18px;
}

#result {
  margin-top:30px;
  white-space:pre-wrap;
  text-align:left;
  background:#020617;
  padding:20px;
  border-radius:10px;
  border:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="container">

<div class="title">xG SCOUT PRO</div>

<div class="cards">

  <div class="card">
    <h3>Domicile</h3>
    <input type="file" id="homeInput" multiple hidden>
    <button class="homeBtn" onclick="homeInput.click()">Ajouter images</button>
    <div id="homePreview" class="preview"></div>
  </div>

  <div class="card">
    <h3>Extérieur</h3>
    <input type="file" id="awayInput" multiple hidden>
    <button class="awayBtn" onclick="awayInput.click()">Ajouter images</button>
    <div id="awayPreview" class="preview"></div>
  </div>

</div>

<button class="analyzeBtn" onclick="analyze()">Analyser</button>

<div id="result"></div>

</div>

<script>

function showPreview(input, containerId){
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  [...input.files].forEach(file=>{
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    container.appendChild(img);
  });
}

homeInput.onchange = () => showPreview(homeInput, "homePreview");
awayInput.onchange = () => showPreview(awayInput, "awayPreview");

function fileToBase64(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function callAPI(base64, type){
  const res = await fetch('/api/analyze', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      image: base64,
      mediaType: type || 'image/png',
      hint:'understat'
    })
  });

  const data = await res.json();

  if(!res.ok) {
    console.error(data);
    throw new Error(data.error || 'Erreur API');
  }

  return data;
}

async function analyze(){
  const homeFiles = homeInput.files;
  const awayFiles = awayInput.files;

  if(!homeFiles.length || !awayFiles.length){
    alert("Ajoute les images");
    return;
  }

  result.textContent = "Analyse en cours...";

  try{
    const results = [];

    for(let file of homeFiles){
      const b64 = await fileToBase64(file);
      const r = await callAPI(b64, file.type);
      results.push({team:"home", data:r});
    }

    for(let file of awayFiles){
      const b64 = await fileToBase64(file);
      const r = await callAPI(b64, file.type);
      results.push({team:"away", data:r});
    }

    result.textContent = JSON.stringify(results,null,2);

  }catch(err){
    result.textContent = "❌ ERREUR: " + err.message;
  }
}

</script>

</body>
</html>
