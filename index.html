<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>
</head>
<body>

<h1>xG Scout Pro</h1>

<h3>Equipe domicile</h3>
<input type="file" id="homeInput" multiple accept="image/*">

<h3>Equipe extérieur</h3>
<input type="file" id="awayInput" multiple accept="image/*">

<br><br>
<button onclick="analyzeMatch()">Analyser le match</button>

<pre id="result"></pre>

<script>
const homeInput = document.getElementById('homeInput');
const awayInput = document.getElementById('awayInput');

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzeMatch() {
  const homeFiles = homeInput.files;
  const awayFiles = awayInput.files;

  if (!homeFiles.length || !awayFiles.length) {
    alert('Ajoute des images domicile et extérieur');
    return;
  }

  document.getElementById('result').textContent = 'Analyse en cours...';

  try {
    const results = [];

    // Analyse domicile
    for (let file of homeFiles) {
      const base64 = await fileToBase64(file);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: base64,
          mediaType: file.type,
          hint: 'understat'
        })
      });

      const data = await res.json();
      results.push({ team: 'home', file: file.name, data });
    }

    // Analyse extérieur
    for (let file of awayFiles) {
      const base64 = await fileToBase64(file);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: base64,
          mediaType: file.type,
          hint: 'understat'
        })
      });

      const data = await res.json();
      results.push({ team: 'away', file: file.name, data });
    }

    document.getElementById('result').textContent = JSON.stringify(results, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById('result').textContent = 'Erreur : ' + err.message;
  }
}
</script>

</body>
</html>
