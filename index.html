<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Analyzer</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0f;
  color:white;
}
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}
.title{
  font-size:32px;
  font-weight:bold;
}
.card{
  background:#12121a;
  border:1px solid #1e1e2e;
  border-radius:15px;
  padding:20px;
  margin-top:20px;
}
.upload{
  border:2px dashed #2a2a3a;
  border-radius:10px;
  padding:20px;
  text-align:center;
  cursor:pointer;
}
.preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}
input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #2a2a3a;
  background:#1a1a24;
  color:white;
}
button{
  padding:15px;
  border:none;
  border-radius:10px;
  margin-top:20px;
  cursor:pointer;
  width:100%;
  font-weight:bold;
}
.analyze{
  background:#7c3aed;
  color:white;
}
.result{
  background:#1a1a24;
  padding:15px;
  border-radius:10px;
  margin-top:20px;
  white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<div class="title">⚽ Football Analyzer</div>

<div class="card">
<h3>🏠 Domicile</h3>
<input type="file" id="domInput">
<div id="domPreview" class="preview"></div>
</div>

<div class="card">
<h3>✈️ Extérieur</h3>
<input type="file" id="extInput">
<div id="extPreview" class="preview"></div>
</div>

<div class="card">
<h3>Buteurs</h3>
<input id="buteursDom" placeholder="Buteurs DOM">
<input id="buteursExt" placeholder="Buteurs EXT">

<h3>Absents</h3>
<input id="absentsDom" placeholder="Absents DOM">
<input id="absentsExt" placeholder="Absents EXT">
</div>

<button class="analyze" onclick="analyze()">ANALYSER</button>

<div id="result" class="result"></div>

</div>

<script>

// ✅ MET TON BACKEND ICI (déjà intégré)
const API = "https://football-analyzer-api.vercel.app/api";

let domImage = null;
let extImage = null;
let domData = null;
let extData = null;

// preview
domInput.onchange = e=>{
  const file = e.target.files[0];
  domImage = file;
  domPreview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
};

extInput.onchange = e=>{
  const file = e.target.files[0];
  extImage = file;
  extPreview.innerHTML = `<img src="${URL.createObjectURL(file)}">`;
};

// base64
function toBase64(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.readAsDataURL(file);
  });
}

// analyze image (Claude via backend)
async function analyzeImage(base64, type){
  const res = await fetch(API+"/analyze-image",{
    method:"POST",
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      image_base64: base64,
      team_type: type
    })
  });

  return await res.json();
}

// main
async function analyze(){

  const resultBox = document.getElementById("result");
  resultBox.innerHTML = "Analyse en cours...";

  try{

    // 1. extraction Claude
    if(domImage){
      const b64 = await toBase64(domImage);
      const r = await analyzeImage(b64,"dom");
      domData = r.data;
    }

    if(extImage){
      const b64 = await toBase64(extImage);
      const r = await analyzeImage(b64,"ext");
      extData = r.data;
    }

    // 2. create match
    const matchRes = await fetch(API+"/matches",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        mode:"1_match",
        buteurs_dom: buteursDom.value,
        buteurs_ext: buteursExt.value,
        absents_dom: absentsDom.value,
        absents_ext: absentsExt.value
      })
    });

    const match = await matchRes.json();

    // 3. update xg
    if(domData){
      await fetch(API+"/matches/"+match.id,{
        method:"PUT",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ xg_dom_data: domData })
      });
    }

    if(extData){
      await fetch(API+"/matches/"+match.id,{
        method:"PUT",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ xg_ext_data: extData })
      });
    }

    // 4. analyse IA (Claude aussi)
    const analysisRes = await fetch(API+"/analyze-match/"+match.id,{
      method:"POST"
    });

    const final = await analysisRes.json();

    resultBox.innerHTML = `
      <h3>📊 Analyse IA</h3>
      <p>${final.analysis || "Aucune analyse"}</p>
    `;

  }catch(err){
    resultBox.innerHTML = "Erreur: "+err.message;
  }
}

</script>

</body>
</html>
