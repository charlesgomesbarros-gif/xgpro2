<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>

<style>
body{background:#0a0d14;color:#fff;font-family:sans-serif;padding:20px}
.tabs button{margin:5px;padding:10px;cursor:pointer}
.panel{display:none}
.panel.active{display:block}
img{width:80px;margin:5px;border-radius:8px}
</style>
</head>

<body>

<h1>xG SCOUT PRO</h1>

<!-- TABS -->
<div class="tabs">
  <button id="tb0">Analyse</button>
  <button id="tb1">Données</button>
  <button id="tb2">Classements</button>
</div>

<!-- TAB 0 -->
<div id="tab0" class="panel active">

  <h2>Upload xG</h2>

  <input type="file" id="homeInput" multiple>
  <div id="homePreview"></div>

  <input type="file" id="awayInput" multiple>
  <div id="awayPreview"></div>

  <button onclick="analyzeMatch()">Analyser match</button>

  <h3>Résultat</h3>
  <div id="result"></div>

</div>

<!-- TAB 1 -->
<div id="tab1" class="panel">
  <h2>Données</h2>
  <p>Upload tes datas ici</p>
</div>

<!-- TAB 2 -->
<div id="tab2" class="panel">
  <h2>Classements</h2>
</div>

<script>
/* =========================
   GLOBAL DATA
========================= */
let homeFiles = [];
let awayFiles = [];

/* =========================
   NAVIGATION FIX
========================= */
document.querySelectorAll("[id^='tb']").forEach(btn => {
  btn.addEventListener("click", () => {
    const id = btn.id.replace("tb", "");

    document.querySelectorAll("[id^='tab']").forEach(t => t.classList.remove("active"));
    document.getElementById("tab" + id).classList.add("active");
  });
});

/* =========================
   IMAGE UPLOAD + PREVIEW
========================= */
function addFiles(event, team) {
  const files = Array.from(event.target.files);
  const container = document.getElementById(team + "Preview");

  files.forEach(file => {
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = document.createElement("img");
      img.src = e.target.result;
      container.appendChild(img);
    };

    reader.readAsDataURL(file);
  });

  if (team === "home") {
    homeFiles.push(...files);
  } else {
    awayFiles.push(...files);
  }
}

document.getElementById("homeInput").addEventListener("change", e => addFiles(e,"home"));
document.getElementById("awayInput").addEventListener("change", e => addFiles(e,"away"));

/* =========================
   FIND DATA SAFE
========================= */
function findTeamData(team) {
  const file = [...homeFiles, ...awayFiles].find(f =>
    f.name.toLowerCase().includes(team.toLowerCase())
  );

  return file ? file.name : null;
}

/* =========================
   BUILD MATCH SAFE
========================= */
function buildMatchData(match) {
  const homeData = findTeamData(match.home);
  const awayData = findTeamData(match.away);

  return {
    home: match.home,
    away: match.away,
    homeData: homeData || "No data available",
    awayData: awayData || "No data available"
  };
}

/* =========================
   FAKE API (remplace après)
========================= */
async function callAPI(prompt){
  return "Analyse simulée :\n" + prompt;
}

/* =========================
   MATCH ANALYSIS
========================= */
async function analyzeMatch() {
  const match = {
    home: "HomeTeam",
    away: "AwayTeam"
  };

  const data = buildMatchData(match);

  const prompt = `
Match: ${data.home} vs ${data.away}

HOME:
${data.homeData}

AWAY:
${data.awayData}
`;

  const res = await callAPI(prompt);

  document.getElementById("result").innerText = res;
}

/* =========================
   DAY ANALYSIS (FIX)
========================= */
async function analyzeDaySelected(matches) {
  if (!matches || matches.length === 0) {
    alert("Aucun match");
    return;
  }

  let allResults = "";

  for (const match of matches) {
    const data = buildMatchData(match);

    const prompt = `
Match: ${data.home} vs ${data.away}

HOME DATA:
${data.homeData}

AWAY DATA:
${data.awayData}
`;

    const res = await callAPI(prompt);

    allResults += `\n\n=== ${match.home} vs ${match.away} ===\n${res}`;
  }

  document.getElementById("result").innerText = allResults;
}
</script>

</body>
</html>
