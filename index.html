<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  padding: 20px;
}

h1 {
  text-align: center;
}

.section {
  margin: 20px 0;
}

.dropzone {
  border: 2px dashed #334155;
  padding: 20px;
  text-align: center;
  border-radius: 10px;
  cursor: pointer;
}

.preview {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 10px;
}

.preview img {
  width: 100px;
  border-radius: 8px;
}

button {
  padding: 12px 20px;
  background: #22c55e;
  border: none;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

#result {
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>xG Scout Pro</h1>

<div class="section">
  <h3>Equipe domicile</h3>
  <input type="file" id="homeInput" multiple accept="image/*">
  <div id="homePreview" class="preview"></div>
</div>

<div class="section">
  <h3>Equipe extérieur</h3>
  <input type="file" id="awayInput" multiple accept="image/*">
  <div id="awayPreview" class="preview"></div>
</div>

<button onclick="analyze()">Analyser</button>

<div id="result"></div>

<script>
// preview images
function showPreview(input, containerId) {
  const container = document.getElementById(containerId);
  container.innerHTML = "";

  [...input.files].forEach(file => {
    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    container.appendChild(img);
  });
}

document.getElementById("homeInput").addEventListener("change", function(){
  showPreview(this, "homePreview");
});

document.getElementById("awayInput").addEventListener("change", function(){
  showPreview(this, "awayPreview");
});

// convert base64
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// call API
async function callAPI(base64, type) {
  const res = await fetch('/api/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      image: base64,
      mediaType: type,
      hint: 'understat'
    })
  });

  const data = await res.json();

  if (!res.ok) {
    throw new Error(data.error || "Erreur API");
  }

  return data;
}

// main analyze
async function analyze() {
  const homeFiles = document.getElementById("homeInput").files;
  const awayFiles = document.getElementById("awayInput").files;

  if (!homeFiles.length || !awayFiles.length) {
    alert("Ajoute images domicile + extérieur");
    return;
  }

  document.getElementById("result").textContent = "Analyse en cours...";

  try {
    const results = [];

    // domicile
    for (let file of homeFiles) {
      const b64 = await fileToBase64(file);
      const res = await callAPI(b64, file.type);
      results.push({ team: "home", file: file.name, res });
    }

    // extérieur
    for (let file of awayFiles) {
      const b64 = await fileToBase64(file);
      const res = await callAPI(b64, file.type);
      results.push({ team: "away", file: file.name, res });
    }

    document.getElementById("result").textContent =
      JSON.stringify(results, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById("result").textContent =
      "Erreur: " + err.message;
  }
}
</script>

</body>
</html>
