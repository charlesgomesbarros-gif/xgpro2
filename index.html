<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>XG Scout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-bottom: 20px;
    }

    .box {
      border: 2px dashed #334155;
      padding: 20px;
      width: 40%;
      min-height: 150px;
      border-radius: 10px;
    }

    button {
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      color: black;
      font-weight: bold;
      cursor: pointer;
      border-radius: 8px;
      margin-top: 10px;
    }

    button:hover {
      background: #16a34a;
    }

    .file {
      margin: 5px 0;
      font-size: 14px;
    }

    #result {
      margin-top: 20px;
      white-space: pre-wrap;
      text-align: left;
      background: #020617;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>⚽ XG Scout</h1>

<div class="container">
  <div class="box">
    <h3>Home Team</h3>
    <input type="file" multiple onchange="addFiles(event, 'home')">
    <div id="homeList"></div>
  </div>

  <div class="box">
    <h3>Away Team</h3>
    <input type="file" multiple onchange="addFiles(event, 'away')">
    <div id="awayList"></div>
  </div>
</div>

<button onclick="analyze()">Analyser</button>

<div id="result"></div>

<script>
/* =========================
   VARIABLES
   ========================= */

let homeFiles = [];
let awayFiles = [];

/* =========================
   FILE MANAGEMENT
   ========================= */

function addFiles(event, team) {
  const files = Array.from(event.target.files);

  if (team === "home") {
    homeFiles.push(...files);
    renderFiles("home");
  } else {
    awayFiles.push(...files);
    renderFiles("away");
  }
}

function renderFiles(team) {
  const container = document.getElementById(team + "List");
  container.innerHTML = "";

  const files = team === "home" ? homeFiles : awayFiles;

  files.forEach((file, index) => {
    const div = document.createElement("div");
    div.className = "file";

    div.innerHTML = `
      ${file.name}
      <button onclick="removeFile('${team}', ${index})">❌</button>
    `;

    container.appendChild(div);
  });
}

function removeFile(team, index) {
  if (team === "home") {
    homeFiles.splice(index, 1);
    renderFiles("home");
  } else {
    awayFiles.splice(index, 1);
    renderFiles("away");
  }
}

/* =========================
   MAIN ANALYSIS
   ========================= */

async function analyze() {
  if (homeFiles.length === 0 || awayFiles.length === 0) {
    alert("Ajoute des fichiers pour les deux équipes");
    return;
  }

  document.getElementById("result").innerText = "Analyse en cours...";

  try {
    const homeText = await readFiles(homeFiles);
    const awayText = await readFiles(awayFiles);

    const finalPrompt = `
Analyse ce match de football avec les données suivantes :

HOME TEAM:
${homeText}

AWAY TEAM:
${awayText}

Donne :
- Probabilité de victoire (%)
- Over/Under 2.5
- BTTS (oui/non)
- Score probable
- Analyse xG détaillée
`;

    const response = await callAPI(finalPrompt);

    document.getElementById("result").innerText = response;

  } catch (err) {
    document.getElementById("result").innerText = "Erreur: " + err.message;
  }
}

/* =========================
   FILE READER
   ========================= */

function readFiles(files) {
  return Promise.all(files.map(file => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result);
      reader.readAsText(file);
    });
  })).then(results => results.join("\n\n"));
}

/* =========================
   API CALL (ANTHROPIC)
   ========================= */

async function callAPI(prompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": "TA_CLE_API_ICI",
      "anthropic-version": "2023-06-01"
    },
    body: JSON.stringify({
      model: "claude-3-sonnet-20240229",
      max_tokens: 1000,
      messages: [
        {
          role: "user",
          content: prompt
        }
      ]
    })
  });

  const data = await res.json();

  return data.content?.[0]?.text || "Pas de réponse";
}

</script>

</body>
</html>
