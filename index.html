<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>
<style>
body { font-family: Arial; background:#0f172a; color:white; padding:20px; }
h1 { text-align:center; }
.section { margin:20px 0; }
button { padding:10px 20px; background:#22c55e; border:none; color:white; cursor:pointer; }
</style>
</head>
<body>

<h1>xG Scout Pro</h1>

<div class="section">
  <h3>Equipe domicile</h3>
  <input type="file" id="hi" multiple accept="image/*">
</div>

<div class="section">
  <h3>Equipe extérieur</h3>
  <input type="file" id="ai" multiple accept="image/*">
</div>

<div class="section">
  <button onclick="analyzeMatch()">Analyser</button>
</div>

<pre id="result"></pre>

<script>
async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function analyzeMatch() {
  const homeFiles = document.getElementById('hi').files;
  const awayFiles = document.getElementById('ai').files;

  if (!homeFiles.length || !awayFiles.length) {
    alert('Ajoute des images domicile et extérieur');
    return;
  }

  document.getElementById('result').textContent = 'Analyse en cours...';

  try {
    const results = [];

    for (let file of homeFiles) {
      const base64 = await fileToBase64(file);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: base64,
          mediaType: file.type,
          hint: 'understat'
        })
      });

      const data = await res.json();
      results.push({ team: 'home', file: file.name, data });
    }

    for (let file of awayFiles) {
      const base64 = await fileToBase64(file);

      const res = await fetch('/api/analyze', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image: base64,
          mediaType: file.type,
          hint: 'understat'
        })
      });

      const data = await res.json();
      results.push({ team: 'away', file: file.name, data });
    }

    document.getElementById('result').textContent = JSON.stringify(results, null, 2);

  } catch (err) {
    console.error(err);
    document.getElementById('result').textContent = 'Erreur : ' + err.message;
  }
}
</script>

</body>
</html>
