<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>xG Scout Pro</title>

<style>
body{
  margin:0;
  font-family:Inter, sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
}

.title{
  text-align:center;
  font-size:48px;
  font-weight:800;
  background:linear-gradient(90deg,#facc15,#f97316);
  -webkit-background-clip:text;
  color:transparent;
}

.subtitle{
  text-align:center;
  color:#94a3b8;
  margin-bottom:30px;
}

.cards{
  display:flex;
  gap:20px;
}

.card{
  flex:1;
  background:#0f172a;
  border:1px solid #1e293b;
  border-radius:20px;
  padding:20px;
}

.upload-box{
  border:2px dashed #1e293b;
  border-radius:15px;
  height:160px;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  cursor:pointer;
  transition:0.2s;
}

.upload-box:hover{
  border-color:#7c3aed;
}

.preview img{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

.btn{
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.dom{ background:#3b82f6; color:white;}
.ext{ background:#f97316; color:white;}

.analyze{
  margin-top:30px;
  width:100%;
  padding:15px;
  border-radius:12px;
  background:linear-gradient(90deg,#7c3aed,#a855f7);
  border:none;
  font-size:18px;
  font-weight:bold;
  cursor:pointer;
}

.result{
  margin-top:30px;
  background:#020617;
  padding:20px;
  border-radius:15px;
  border:1px solid #1e293b;
}
</style>
</head>

<body>

<div class="container">

<div class="title">XG SCOUT PRO</div>
<div class="subtitle">Analyse Match • xG • IA</div>

<div class="cards">

  <!-- DOM -->
  <div class="card">
    <h3>🏠 Equipe domicile</h3>

    <div class="upload-box" onclick="domInput.click()">
      <p>Ajouter images</p>
    </div>

    <input type="file" id="domInput" hidden>

    <div id="domPreview" class="preview"></div>
  </div>

  <!-- EXT -->
  <div class="card">
    <h3>✈️ Equipe extérieur</h3>

    <div class="upload-box" onclick="extInput.click()">
      <p>Ajouter images</p>
    </div>

    <input type="file" id="extInput" hidden>

    <div id="extPreview" class="preview"></div>
  </div>

</div>

<button class="analyze" onclick="analyze()">⚡ ANALYSER LE MATCH</button>

<div id="result" class="result"></div>

</div>

<script>

// ⚠️ MET TON BACKEND ICI
const API = "https://football-analyzer-api.vercel.app/api";

let domFile = null;
let extFile = null;

// preview
domInput.onchange = e=>{
  domFile = e.target.files[0];
  domPreview.innerHTML = `<img src="${URL.createObjectURL(domFile)}">`;
};

extInput.onchange = e=>{
  extFile = e.target.files[0];
  extPreview.innerHTML = `<img src="${URL.createObjectURL(extFile)}">`;
};

// base64
function toBase64(file){
  return new Promise(res=>{
    const reader = new FileReader();
    reader.onload = ()=>res(reader.result);
    reader.readAsDataURL(file);
  });
}

// analyze
async function analyze(){

  result.innerHTML = "⏳ Analyse en cours...";

  try{

    let domData=null;
    let extData=null;

    // 1 extraction Claude
    if(domFile){
      const b64 = await toBase64(domFile);
      const r = await fetch(API+"/analyze-image",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image_base64:b64,team_type:"dom"})
      });
      domData = (await r.json()).data;
    }

    if(extFile){
      const b64 = await toBase64(extFile);
      const r = await fetch(API+"/analyze-image",{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({image_base64:b64,team_type:"ext"})
      });
      extData = (await r.json()).data;
    }

    // 2 create match
    const matchRes = await fetch(API+"/matches",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:"1_match"})
    });

    const match = await matchRes.json();

    // 3 update xg
    if(domData){
      await fetch(API+"/matches/"+match.id,{
        method:"PUT",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({xg_dom_data:domData})
      });
    }

    if(extData){
      await fetch(API+"/matches/"+match.id,{
        method:"PUT",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({xg_ext_data:extData})
      });
    }

    // 4 analyse IA
    const analysisRes = await fetch(API+"/analyze-match/"+match.id,{
      method:"POST"
    });

    const final = await analysisRes.json();

    result.innerHTML = `
      <h3>📊 Analyse IA</h3>
      <p>${final.analysis || "Aucune analyse"}</p>
    `;

  }catch(err){
    result.innerHTML = "❌ Erreur : "+err.message;
  }
}

</script>

</body>
</html>
